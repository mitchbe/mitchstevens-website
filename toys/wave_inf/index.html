<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Wave Explorer</title>
  <style>
    body {
      margin: 0;
      background: black;
      color: white;
      font-family: sans-serif;
    }
    canvas {
      display: block;
      margin: 0 auto;
      border: 1px solid #333;
    }
    .controls {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 1em;
      padding: 1em;
      background: #111;
    }
    .control-group {
      display: flex;
      flex-direction: column;
      align-items: center;
    }
    .range-group {
      display: flex;
      align-items: center;
      gap: 0.5em;
    }
    input[type="range"] {
      width: 120px;
    }
    input[type="number"] {
      width: 60px;
      background: #000;
      color: white;
      border: 1px solid #444;
    }
    label {
      font-size: 0.85em;
      margin-top: 0.3em;
    }
    button {
      background: #222;
      border: 1px solid #555;
      color: white;
      padding: 0.4em 0.8em;
      cursor: pointer;
    }
    button:hover {
      background: #333;
    }
  </style>
</head>
<body>
  <canvas id="canvas" width="600" height="600"></canvas>

  <div class="controls">
    <!-- Toggles -->
    <div class="control-group">
      <input type="checkbox" id="toggleColor" checked />
      <label for="toggleColor">Show Color Field</label>
    </div>
    <div class="control-group">
      <input type="checkbox" id="toggleThreshold" checked />
      <label for="toggleThreshold">Highlight Threshold</label>
    </div>
    <div class="control-group">
      <input type="checkbox" id="pauseTime" />
      <label for="pauseTime">Freeze Time</label>
    </div>

    <!-- Field tuning -->
    <div class="control-group">
      <input type="range" id="threshold" min="0" max="1" step="0.01" value="0.98" />
      <label for="threshold">Threshold Level</label>
    </div>

    <div class="control-group">
      <input type="range" id="saturation" min="0" max="100" value="100" />
      <label for="saturation">Color Saturation</label>
    </div>

    <div class="control-group">
      <input type="range" id="lightness" min="0" max="100" value="50" />
      <label for="lightness">Color Lightness</label>
    </div>

    <!-- Master Time -->
    <div class="control-group">
      <div class="range-group">
        <input type="range" id="masterTime" min="0" max="6.28" step="0.01" value="0" />
        <input type="number" id="masterTimeInput" min="0" max="6.28" step="0.01" value="0" />
      </div>
      <label for="masterTime">Master Phase (Time)</label>
    </div>

    <!-- Wavelength -->
    <div class="control-group">
      <div class="range-group">
        <input type="range" id="wavelengthSlider" min="0.01" max="200" step="0.01" value="20" />
        <input type="number" id="wavelengthInput" min="0.01" max="200" step="0.01" value="20" />
      </div>
      <label for="wavelengthSlider">Wavelength (Lower = Higher Frequency)</label>
    </div>

    <!-- Zoom Factor -->
    <div class="control-group">
      <input type="number" id="zoomInput" min="1" step="1" value="1" />
      <label for="zoomInput">Zoom Factor (1 = default)</label>
    </div>

    <!-- Emitter Management -->
    <div class="control-group">
      <button id="addEmitterBtn">Add Emitter</button>
      <button id="removeEmitterBtn">Remove Emitter</button>
    </div>

    <!-- Export Controls -->
    <div class="control-group">
      <input type="number" id="frameStepInput" min="0.001" step="0.001" value="0.05" />
      <label for="frameStepInput">Frame Step (Δphase)</label>
    </div>
    <div class="control-group">
      <button id="exportBtn">Export</button>
      <label for="exportBtn">Export Full Loop</label>
    </div>

    <!-- Per-Emitter Controls -->
    <div id="emitterPhaseControls" class="control-group"></div>
  </div>

  <!-- Local zip.js -->
  <script src="zip.min.js"></script>
  <script src="main.js"></script>
</body>
</html>
